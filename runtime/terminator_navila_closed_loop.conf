[global_config]
[keybindings]
[profiles]
  [[default]]
[layouts]
  [[default]]
    [[[window0]]]
      type = Window
      parent = ""
    [[[child1]]]
      type = Terminal
      parent = window0
  [[navila_closed_loop]]
    [[[window0]]]
      type = Window
      parent = ""
      title = NaVILA Closed Loop
      size = 1700, 1000
    
    [[[vpaned_main]]]
      type = VPaned
      parent = window0
      order = 0
      position = 300
      ratio = 0.30
    
    [[[hpaned_top]]]
      type = HPaned
      parent = vpaned_main
      order = 0
      position = 850
      ratio = 0.50
    
    [[[hpaned_bottom]]]
      type = HPaned
      parent = vpaned_main
      order = 1
      position = 1300
      ratio = 0.76
    
    [[[terminal_camera]]]
      type = Terminal
      parent = hpaned_top
      order = 0
      title = MuJoCo Camera Stream
      command = '''bash -lc 'cd "/home/kylin/robotics/holosoma"; echo "[MuJoCo Camera Stream]"; echo "bash scripts/run_navila_mujoco_stream.sh"; bash scripts/run_navila_mujoco_stream.sh; exec bash''''
    
    [[[terminal_policy]]]
      type = Terminal
      parent = hpaned_top
      order = 1
      title = Holosoma Policy
      command = '''bash -lc 'cd "/home/kylin/robotics/dex-manup-robot"; echo "[Holosoma Policy]"; echo "HOLOSOMA_INTERFACE=lo bash test/run_holosoma_policy.sh"; HOLOSOMA_ROOT="/home/kylin/robotics/holosoma" HOLOSOMA_INTERFACE="lo" bash test/run_holosoma_policy.sh; exec bash''''
    
    [[[terminal_client]]]
      type = Terminal
      parent = hpaned_bottom
      order = 0
      title = NaVILA Client + Bridge
      command = '''bash -lc 'cd "/home/kylin/robotics/dex-manup-robot"; echo "[NaVILA Client + Bridge]"; echo "NAVILA_MODE=sim NAVILA_NO_VLM=1 VLM_HOST=100.110.59.37 VLM_PORT=54321 bash test/run_navila_mujoco_client.sh"; NAVILA_MODE="sim" NAVILA_NO_VLM="1" VLM_HOST="100.110.59.37" VLM_PORT="54321" HOLOSOMA_ROOT="/home/kylin/robotics/holosoma" NAVILA_CONTROL_FIFO="/home/kylin/robotics/dex-manup-robot/runtime/navila_control.fifo" NAVILA_CLIENT_INTERVAL_SEC="0.2" NAVILA_LINEAR_SPEED="0.45" NAVILA_ANGULAR_SPEED_DEGPS="60.0" bash "test/run_navila_mujoco_client.sh"; exec bash''''
    
    [[[terminal_manual]]]
      type = Terminal
      parent = hpaned_bottom
      order = 1
      title = Manual Control Console
      command = '''bash -lc 'cd "/home/kylin/robotics/dex-manup-robot"; echo "[Manual Control Console]"; echo "NAVILA_CONTROL_FIFO=/home/kylin/robotics/dex-manup-robot/runtime/navila_control.fifo bash test/run_navila_manual_console.sh"; NAVILA_CONTROL_FIFO="/home/kylin/robotics/dex-manup-robot/runtime/navila_control.fifo" NAVILA_MANUAL_STEP_CM="20" NAVILA_MANUAL_TURN_DEG="15" bash test/run_navila_manual_console.sh; exec bash''''
[plugins]
