[global_config]
[keybindings]
[profiles]
  [[default]]
[layouts]
  [[default]]
    [[[window0]]]
      type = Window
      parent = ""
    [[[child1]]]
      type = Terminal
      parent = window0
  [[navila_closed_loop]]
    [[[window0]]]
      type = Window
      parent = ""
      title = NaVILA Closed Loop
      size = 1600, 1000
    
    [[[vpaned0]]]
      type = VPaned
      parent = window0
      order = 0
      position = 280
      ratio = 0.28
    
    [[[hpaned0]]]
      type = HPaned
      parent = vpaned0
      order = 0
      position = 800
      ratio = 0.50
    
    [[[terminal_mujoco]]]
      type = Terminal
      parent = hpaned0
      order = 0
      title = MuJoCo Camera Stream
      command = '''bash -lc 'cd "/home/kylin/robotics/holosoma"; echo "[MuJoCo Camera Stream]"; echo "bash scripts/run_navila_mujoco_stream.sh"; bash scripts/run_navila_mujoco_stream.sh; exec bash''''
    
    [[[terminal_policy]]]
      type = Terminal
      parent = hpaned0
      order = 1
      title = Holosoma Policy
      command = '''bash -lc 'cd "/home/kylin/robotics/dex-manup-robot"; echo "[Holosoma Policy]"; echo "bash test/run_holosoma_policy.sh"; HOLOSOMA_ROOT="/home/kylin/robotics/holosoma" HOLOSOMA_INTERFACE="lo" bash test/run_holosoma_policy.sh; exec bash''''
    
    [[[terminal_client]]]
      type = Terminal
      parent = vpaned0
      order = 1
      title = NaVILA Client + Bridge
      command = '''bash -lc 'cd "/home/kylin/robotics/dex-manup-robot"; echo "[NaVILA Client + Bridge]"; echo "bash test/run_navila_client_wait_ok.sh"; VLM_HOST="100.110.59.37" VLM_PORT="54321" HOLOSOMA_ROOT="/home/kylin/robotics/holosoma" bash test/run_navila_client_wait_ok.sh; exec bash''''
[plugins]
